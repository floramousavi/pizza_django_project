{% extends "base.html" %}

{% block title %}Update Order Status | Pizza Take-Out{% endblock %}

{% block content %}
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title">Update Order #{{ order.id }}</h2>

            <p class="meta-text mb-1">Customer: {{ order.user.username }}</p>
            <p class="mb-3">
                Current status:
                <span class="status-badge order-status-{{ order.status|lower }}">
                    {{ order.status }}
                </span>
            </p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Save status</button>
                <a href="{% url 'orders:staff_order_list' %}" class="btn btn-secondary">Back</a>
            </form>
        </div>
    </div>
{% endblock %}
