{% extends "base.html" %}

{% block title %}{{ pizza.name }} | Pizza Take-Out{% endblock %}

{% block content %}
    <h2>{{ pizza.name }}</h2>
    <p>{{ pizza.description }}</p>

    <h3>Customize your pizza</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add to cart</button>
    </form>

    <p><a href="{% url 'menu:menu_list' %}">Back to menu</a></p>
{% endblock %}
