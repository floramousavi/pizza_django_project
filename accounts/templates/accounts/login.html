{% extends "base.html" %}

{% block title %}Login | Pizza Take-Out{% endblock %}

{% block content %}
<style>
    .ftco-section .auth-heading,
    .ftco-section .auth-heading * {
        color: #212529 !important;
    }

    .auth-box,
    .auth-box * {
        color: #212529 !important;
    }

    .auth-box .btn-primary {
        color: #ffffff !important;
    }

    .auth-box a {
        color: #c49b63 !important;
    }

    .auth-box input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ced4da;
        border-radius: 6px;
        margin-bottom: 12px;
    }

    .auth-box label {
        font-weight: 600;
        margin-bottom: 6px;
        display: block;
    }

    .auth-box ul.errorlist {
        color: #dc3545 !important;
        padding-left: 18px;
        margin-bottom: 10px;
    }
</style>

<section class="ftco-section">
    <div class="container">
        <div class="row justify-content-center mb-5 pb-3">
            <div class="col-md-7 auth-heading text-center ftco-animate">
                <h2 class="mb-4">Login</h2>
                <p>Sign in to view your cart, place orders, and track your order history.</p>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="auth-box p-4" style="background: #ffffff; border-radius: 10px;">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary py-3 px-4">Login</button>
                    </form>

                    <p class="mt-4 mb-0">
                        Don’t have an account?
                        <a href="{% url 'accounts:register' %}">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
